name: tajwid_coach
description: TajwidCoach - AI-powered Quran Tajwid trainer with Sheikh verification system.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Audio
  just_audio: ^0.9.36
  audio_session: ^0.1.18

  # Speech / ML
  speech_to_text: ^7.3.0
  permission_handler: ^11.0.1

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_messaging: ^15.0.0
  firebase_storage: ^12.0.0
  firebase_analytics: ^11.0.0

  # RevenueCat
  purchases_flutter: ^9.0.0

  # Charts & Animations
  fl_chart: ^0.65.0
  lottie: ^2.7.0

  # UI / Fonts
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  qcf_quran: ^0.0.5
  flutter_screenutil: ^5.9.3
  scrollable_positioned_list: ^0.3.8

  # State / Storage
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  sqflite: ^2.3.0
  path_provider: ^2.1.2
  path: ^1.9.0

  # Utilities
  dio: ^5.4.1
  record: ^6.2.0
  url_launcher: ^6.2.1
  intl: ^0.18.1
  image_gallery_saver_plus: ^4.0.1
  share_plus: ^7.2.1
  uuid: ^4.2.1
  connectivity_plus: ^5.0.2
  pdf: ^3.11.1
  printing: ^5.13.1

  cupertino_icons: ^1.0.6
  html_unescape: ^2.0.0
  youtube_player_flutter: ^9.1.3
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  purchases_ui_flutter: ^9.16.1
  google_mobile_ads: ^5.1.0
  package_info_plus: ^8.0.0
  in_app_review: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/lottie/
    - assets/images/
    - assets/images/quran/
    - assets/icons/
    - assets/fonts/
    - assets/databases/

  fonts:
    - family: AmiriQuran
      fonts:
        - asset: assets/fonts/AmiriQuran.ttf
    - family: UthmanicHafs
      fonts:
        - asset: assets/fonts/UthmanicHafs.ttf
    - family: IndoPak
      fonts:
        - asset: assets/fonts/IndoPak.ttf
